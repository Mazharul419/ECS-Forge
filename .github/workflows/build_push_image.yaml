name: CI - Build and Scan Docker image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: ecs-project-global-ecr
  ECS_CLUSTER_DEV: ecs-project-dev-cluster
  ECS_SERVICE_DEV: ecs-project-dev-ecs-service
  ECS_TASK_DEV: ecs-project-dev-task

permissions:
  id-token: write
  contents: read

jobs:
  
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.vars.outputs.sha }}
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set variables
        id: vars
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ecs-project-global-ecr
          IMAGE_TAG: ${{ steps.vars.outputs.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t ${IMAGE_URI} .
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Login to ECR (refresh token)
        id: login-ecr-push
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          docker push ${IMAGE_URI}
          echo "Pushed: ${IMAGE_URI}"